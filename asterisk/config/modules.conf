; =============================================================
; Modules Configuration — Strategaize Business System V5.1
; Load only what we need for WebRTC + SIP + Recording
; =============================================================

[modules]
autoload = yes

; Disable unused channel drivers
noload = chan_alsa.so
noload = chan_console.so
noload = chan_oss.so
noload = chan_sip.so
noload = chan_skinny.so
noload = chan_unistim.so
noload = chan_mgcp.so
noload = chan_iax2.so

; Disable unused apps
noload = app_festival.so
noload = app_followme.so
noload = app_queue.so
noload = app_voicemail.so

; Disable unused res modules
noload = res_calendar.so
noload = res_fax.so
noload = res_phoneprov.so
noload = res_adsi.so
noload = res_smdi.so

; Ensure critical modules are loaded
load = res_pjsip.so
load = res_pjsip_transport_websocket.so
load = res_http_websocket.so
load = app_mixmonitor.so
load = app_echo.so
load = res_musiconhold.so
load = codec_opus.so
load = codec_ulaw.so
load = codec_alaw.so
