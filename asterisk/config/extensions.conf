; =============================================================
; Dialplan — Strategaize Business System V5.1
; Asterisk 20 LTS
; =============================================================

[general]
static = yes
writeprotect = no

; -------------------------------------------------------------
; WEBRTC OUTBOUND — Browser calls out
; -------------------------------------------------------------
[webrtc-outbound]
; Echo test — extension 600
exten => 600,1,NoOp(Echo Test from ${CALLERID(all)})
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Browser-to-browser internal test — extension 1001
exten => 1001,1,NoOp(Internal test call to 1001)
 same => n,Set(CALL_ID=${PJSIP_HEADER(read,X-Call-ID)})
 same => n,GotoIf($["${CALL_ID}" = ""]?no_callid)
 same => n,MixMonitor(/var/spool/asterisk/monitor/${CALL_ID}.wav)
 same => n,Goto(dial)
 same => n(no_callid),MixMonitor(/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n(dial),Dial(PJSIP/webrtc-user,30,t)
 same => n,Hangup()

; External calls via SIP trunk (only when SIP_TRUNK_ENABLED=true)
; Pattern: any number starting with 0 or + (German/international)
exten => _0X.,1,NoOp(Outbound call to ${EXTEN})
 same => n,Set(CALL_ID=${PJSIP_HEADER(read,X-Call-ID)})
 same => n,GotoIf($["${CALL_ID}" = ""]?no_callid)
 same => n,MixMonitor(/var/spool/asterisk/monitor/${CALL_ID}.wav)
 same => n,Goto(dial)
 same => n(no_callid),MixMonitor(/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n(dial),Dial(PJSIP/${EXTEN}@sip-trunk,120,t)
 same => n,Hangup()

exten => _+X.,1,NoOp(Outbound international call to ${EXTEN})
 same => n,Set(CALL_ID=${PJSIP_HEADER(read,X-Call-ID)})
 same => n,GotoIf($["${CALL_ID}" = ""]?no_callid)
 same => n,MixMonitor(/var/spool/asterisk/monitor/${CALL_ID}.wav)
 same => n,Goto(dial)
 same => n(no_callid),MixMonitor(/var/spool/asterisk/monitor/${UNIQUEID}.wav)
 same => n(dial),Dial(PJSIP/${EXTEN}@sip-trunk,120,t)
 same => n,Hangup()

; -------------------------------------------------------------
; FROM-TRUNK — Incoming calls from SIP provider
; -------------------------------------------------------------
[from-trunk]
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)})
 same => n,Set(CALL_ID=${UNIQUEID})
 same => n,MixMonitor(/var/spool/asterisk/monitor/${CALL_ID}.wav)
 same => n,GotoIf($["${SMAO_ENABLED}" = "true"]?smao-route,${EXTEN},1)
 same => n,Dial(PJSIP/webrtc-user,30,t)
 same => n,VoiceMail(webrtc-user@default,u)
 same => n,Hangup()

; -------------------------------------------------------------
; SMAO ROUTE — Route to Voice Agent (disabled in V5.1)
; Activated via SMAO_ENABLED=true
; -------------------------------------------------------------
[smao-route]
exten => _X.,1,NoOp(Routing to SMAO Voice Agent)
 same => n,Dial(PJSIP/${EXTEN}@smao-endpoint,120,t)
 same => n,Hangup()
