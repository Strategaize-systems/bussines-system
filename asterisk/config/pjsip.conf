; =============================================================
; PJSIP Configuration — Strategaize Business System V5.1
; Asterisk 20 LTS — WebRTC + SIP Trunk (prepared)
; =============================================================
; ENV placeholders ($VARIABLE) are replaced by entrypoint.sh
; at container start via envsubst.

; -------------------------------------------------------------
; TRANSPORTS
; -------------------------------------------------------------

; WebSocket transport (WSS) — used by SIP.js in browser
; TLS termination happens at Traefik, Asterisk sees plain WS on 8089
[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:8089

; UDP transport — used by SIP trunk and SMAO
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; -------------------------------------------------------------
; WEBRTC USER ENDPOINT (Single-User V5.1)
; -------------------------------------------------------------

[webrtc-user]
type = endpoint
context = webrtc-outbound
disallow = all
; Ulaw only — codec_opus.so is not bundled in the default Ubuntu asterisk
; package. Without it Asterisk cannot translate Opus → SLIN → ulaw for
; MixMonitor, resulting in empty WAV recordings (44 bytes). Browser + SIP.js
; fall back to PCMU (ulaw) cleanly when Opus is not offered in the SDP.
; Opus re-enablement requires installing codec_opus separately.
allow = ulaw
transport = transport-wss
webrtc = yes
; direct_media = no ensures Asterisk stays in the RTP path so MixMonitor and
; Echo() can actually see and record the audio stream.
direct_media = no
dtls_auto_generate_cert = yes
auth = webrtc-user-auth
aors = webrtc-user-aor
callerid = "Strategaize" <$SIP_CALLER_ID>

[webrtc-user-auth]
type = auth
auth_type = userpass
username = webrtc-user
password = $ASTERISK_WEBRTC_PASSWORD

[webrtc-user-aor]
type = aor
max_contacts = 5
remove_existing = yes
qualify_frequency = 30

; -------------------------------------------------------------
; SIP TRUNK (disabled in V5.1, enabled at Go-Live)
; Activated via SIP_TRUNK_ENABLED=true in ENV
; -------------------------------------------------------------

; trunk endpoint, auth, aor, identify are rendered by entrypoint.sh
; only when SIP_TRUNK_ENABLED=true

; -------------------------------------------------------------
; SMAO VOICE-AGENT ENDPOINT (disabled in V5.1)
; Activated via SMAO_ENABLED=true in ENV
; -------------------------------------------------------------

; smao endpoint rendered by entrypoint.sh
; only when SMAO_ENABLED=true
