version: "3.8"

# Strategaize Business System — Docker Compose
# Self-hosted Supabase + Next.js Cockpit
# Pattern: Blueprint-Plattform (bewährt)

networks:
  business-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  storage-data:
    driver: local
  calcom-db-data:
    driver: local
  # V4.1 Jitsi volumes (SLC-412)
  jitsi-web-config:
    driver: local
  jitsi-web-transcripts:
    driver: local
  jitsi-prosody-config:
    driver: local
  jitsi-prosody-plugins:
    driver: local
  jitsi-jicofo-config:
    driver: local
  jitsi-jvb-config:
    driver: local
  jitsi-jibri-config:
    driver: local
  jitsi-recordings:
    driver: local

services:

  # ============================================================
  # WEB APPLICATION (Next.js Cockpit)
  # ============================================================
  app:
    build:
      context: ./cockpit
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      SUPABASE_URL: http://supabase-kong:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-unused}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-unused}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
      CALCOM_API_KEY: ${CALCOM_API_KEY:-}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:-}
      CALCOM_INTERNAL_URL: http://calcom:3000
      CALCOM_PUBLIC_URL: ${CALCOM_PUBLIC_URL:-https://cal.strategaizetransition.com}
      CALCOM_BOOKING_PATH: ${CALCOM_BOOKING_PATH:-}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_started
      supabase-kong:
        condition: service_started
    networks:
      - business-net

  # ============================================================
  # SUPABASE STACK
  # ============================================================

  supabase-db:
    build:
      context: ./sql
      dockerfile: Dockerfile.db
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      POSTGRES_HOST: /var/run/postgresql
      POSTGRES_USER: postgres
      PGPORT: 5432
    networks:
      - business-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  supabase-auth:
    image: supabase/gotrue:v2.160.0
    restart: unless-stopped
    expose:
      - "9999"
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${NEXT_PUBLIC_APP_URL}
      GOTRUE_URI_ALLOW_LIST: ${NEXT_PUBLIC_APP_URL}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL}/auth/v1
      GOTRUE_API_EXTERNAL_URL: ${NEXT_PUBLIC_APP_URL}/auth/v1
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-unused}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-unused}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-noreply@example.com}
      GOTRUE_SMTP_SENDER_NAME: "Business Cockpit"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_LOG_LEVEL: warn
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - business-net

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - business-net

  supabase-storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      UPLOAD_FILE_SIZE_LIMIT: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
      UPLOAD_FILE_SIZE_LIMIT_STANDARD: ${STORAGE_FILE_SIZE_LIMIT:-209715200}
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    networks:
      - business-net

  supabase-kong:
    build:
      context: ./config
      dockerfile: Dockerfile.kong
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_LOG_LEVEL: warn
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      supabase-auth:
        condition: service_started
      supabase-rest:
        condition: service_started
    networks:
      - business-net

  supabase-meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - business-net

  supabase-studio:
    image: supabase/studio:20241028-a265374
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: Strategaize
      DEFAULT_PROJECT_NAME: "Business System"
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      LOGFLARE_API_KEY: ""
      LOGFLARE_URL: ""
      NEXT_PUBLIC_ENABLE_LOGS: "false"
    depends_on:
      supabase-meta:
        condition: service_started
    networks:
      - business-net

  # ============================================================
  # V4: CAL.COM SELF-HOSTED (FEAT-406, SLC-407)
  # ============================================================

  calcom-db:
    image: postgres:15-alpine
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - calcom-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: ${CALCOM_DB_PASSWORD}
      POSTGRES_DB: calcom
    networks:
      - business-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calcom -d calcom"]
      interval: 10s
      timeout: 5s
      retries: 10

  calcom:
    image: calcom/cal.com:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://calcom:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom
      DATABASE_DIRECT_URL: postgresql://calcom:${CALCOM_DB_PASSWORD}@calcom-db:5432/calcom
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
      NEXT_PUBLIC_WEBAPP_URL: ${CALCOM_PUBLIC_URL:-https://cal.strategaizetransition.com}
      NEXT_PUBLIC_API_V2_URL: ${CALCOM_PUBLIC_URL:-https://cal.strategaizetransition.com}/api/v2
      CALCOM_LICENSE_KEY: ""
      NODE_ENV: production
    depends_on:
      calcom-db:
        condition: service_healthy
    networks:
      - business-net

  # ============================================================
  # V4.1: JITSI MEET STACK (FEAT-404, SLC-412)
  # Pinned: stable-9258 (DEC-040). JWT-Auth via tenant=business.
  # Rollback: docker compose stop jitsi-* (keine V4-Abhaengigkeit).
  # ============================================================

  jitsi-web:
    image: jitsi/web:stable-9258
    restart: unless-stopped
    expose:
      - "80"
    # jitsi/web image exposes both 80 and 443 via Dockerfile EXPOSE.
    # Ohne expliziten Service-Port waehlt Traefik 443, das jedoch HTTPS erwartet (400 Bad Request).
    # Labels zwingen Traefik auf Port 80 (HTTP). Service-Name folgt Coolify-Projekt-UUID-Pattern.
    labels:
      - "traefik.http.services.https-0-k9f5pn5upfq7etoefb5ukbcg-jitsi-web.loadbalancer.server.port=80"
      - "traefik.http.services.http-0-k9f5pn5upfq7etoefb5ukbcg-jitsi-web.loadbalancer.server.port=80"
    environment:
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      AUTH_TYPE: jwt
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-business}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_APP_ID:-business}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_APP_ID:-business}
      PUBLIC_URL: https://${JITSI_DOMAIN:-meet.strategaizetransition.com}
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_BOSH_URL_BASE: http://jitsi-prosody:5280
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      ENABLE_LETSENCRYPT: "0"
      ENABLE_XMPP_WEBSOCKET: "1"
      TZ: Europe/Berlin
    volumes:
      - jitsi-web-config:/config
      - jitsi-web-transcripts:/usr/share/jitsi-meet/transcripts
    depends_on:
      - jitsi-prosody
    networks:
      - business-net

  jitsi-prosody:
    image: jitsi/prosody:stable-9258
    restart: unless-stopped
    expose:
      - "5222"
      - "5269"
      - "5280"
      - "5347"
    environment:
      AUTH_TYPE: jwt
      ENABLE_AUTH: "1"
      ENABLE_GUESTS: "0"
      JWT_APP_ID: ${JITSI_JWT_APP_ID:-business}
      JWT_APP_SECRET: ${JITSI_JWT_APP_SECRET}
      JWT_ACCEPTED_ISSUERS: ${JITSI_JWT_APP_ID:-business}
      JWT_ACCEPTED_AUDIENCES: ${JITSI_JWT_APP_ID:-business}
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD}
      JICOFO_COMPONENT_SECRET: ${JITSI_JICOFO_COMPONENT_SECRET}
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD}
      JIBRI_RECORDER_USER: recorder
      JIBRI_RECORDER_PASSWORD: ${JITSI_JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: jibri
      JIBRI_XMPP_PASSWORD: ${JITSI_JIBRI_XMPP_PASSWORD}
      TZ: Europe/Berlin
    volumes:
      - jitsi-prosody-config:/config
      - jitsi-prosody-plugins:/prosody-plugins-custom
    networks:
      business-net:
        aliases:
          - ${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
          - guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}

  jitsi-jicofo:
    image: jitsi/jicofo:stable-9258
    restart: unless-stopped
    environment:
      AUTH_TYPE: jwt
      ENABLE_AUTH: "1"
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      JICOFO_COMPONENT_SECRET: ${JITSI_JICOFO_COMPONENT_SECRET}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JITSI_JICOFO_AUTH_PASSWORD}
      JVB_BREWERY_MUC: jvbbrewery
      JIBRI_BREWERY_MUC: jibribrewery
      JIBRI_PENDING_TIMEOUT: "90"
      TZ: Europe/Berlin
    volumes:
      - jitsi-jicofo-config:/config
    depends_on:
      - jitsi-prosody
    networks:
      - business-net

  jitsi-jvb:
    image: jitsi/jvb:stable-9258
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      JVB_AUTH_USER: jvb
      JVB_AUTH_PASSWORD: ${JITSI_JVB_AUTH_PASSWORD}
      JVB_BREWERY_MUC: jvbbrewery
      JVB_PORT: "10000"
      JVB_STUN_SERVERS: meet-jit-si-turnrelay.jitsi.net:443
      TZ: Europe/Berlin
    volumes:
      - jitsi-jvb-config:/config
    depends_on:
      - jitsi-prosody
    networks:
      - business-net

  jitsi-jibri:
    image: jitsi/jibri:stable-9258
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN
    environment:
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_RECORDER_DOMAIN: recorder.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: jitsi-prosody
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JIBRI_RECORDER_USER: recorder
      JIBRI_RECORDER_PASSWORD: ${JITSI_JIBRI_RECORDER_PASSWORD}
      JIBRI_XMPP_USER: jibri
      JIBRI_XMPP_PASSWORD: ${JITSI_JIBRI_XMPP_PASSWORD}
      JIBRI_BREWERY_MUC: jibribrewery
      JIBRI_RECORDING_DIR: /recordings
      JIBRI_STRIP_DOMAIN_JID: muc
      JIBRI_LOGS_DIR: /config/logs
      DISPLAY: ":0"
      TZ: Europe/Berlin
    volumes:
      - jitsi-jibri-config:/config
      - jitsi-recordings:/recordings
    depends_on:
      - jitsi-prosody
    networks:
      - business-net

  # ============================================================
  # V3: FIRECRAWL (deaktiviert)
